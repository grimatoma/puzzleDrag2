version: 2
updates:
  # npm dependencies — group routine updates into one PR per week to limit noise.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      dev-dependencies:
        dependency-type: development
      production-dependencies:
        dependency-type: production

  # Keep GitHub Actions (checkout, setup-node, upload-artifact, …) current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
