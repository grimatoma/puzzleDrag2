# CI — lint + typecheck + tests + build + e2e (gating) + visual smoke (informational)
# on every PR vs main and push to main.
#
# Branch protection (set in repo settings — adding jobs here does NOT auto-gate merges).
# The authoritative required-check list is committed at .github/required-checks.json; the
# `gate-guard` job reads branch protection via the API and fails if the two drift apart
# (it soft-skips when the token can't read protection). Keep them in sync.
#
# Required to merge: lint, typecheck, typecheck-tests, typecheck-test-files, test, build,
# e2e-required.
#   - e2e runs as a 3-shard matrix, so GitHub reports it as `e2e (1)`, `e2e (2)`, `e2e (3)`
#     — NONE of which is named `e2e`. Requiring the bare name `e2e` would gate on nothing
#     (health review §6/§8). The `e2e-required` fan-in job aggregates all shards into ONE
#     stable check name; require THAT.
#   - visual-smoke is INFORMATIONAL, not required. The committed board goldens are
#     WebGL/GPU/font-sensitive and were not captured on this exact runner, so a pixel
#     compare here is unreliable — the gating visual signal is the structural/manifest
#     vitest test (src/__tests__/visual-scenarios), not pixels. Regenerate desktop goldens
#     on THIS runner via the `visual-rebaseline` workflow_dispatch when you need them.
#   - Require branches to be up to date before merging; dismiss stale approvals on push.

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_goldens:
        description: "Regenerate desktop visual goldens on the CI runner"
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run action-types:check

  typecheck-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:tests

  # Single-program strict-ish typecheck of every unit/integration test file,
  # gated against tools/test-tsc-baseline.json (fails only on NEW errors).
  # Replaced the old per-file spawn scanner: ~200s O(n) AND silently vacuous
  # (temp configs couldn't resolve @types from /tmp) → ~15s and real. (§9)
  typecheck-test-files:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:test-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  # Builds the shippable app (`build` = vite only — reference docs are NOT part of
  # the shippable build), asserts the output's chunk-splitting invariants
  # (tools/verify-build-output.mjs, moved out of the vitest loop — §3), then
  # builds the docs site too so /docs/ is validated + uploaded. build:docs is
  # guarded (warn-and-exit-0) so a reference-doc/git failure can never fail this
  # job. NOTE: GitHub Pages (deploy.yml) deploys via `npm run build:site` so it
  # keeps shipping /docs — keep those two in sync.
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # build:docs reads git history for per-doc creation dates
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run verify:build
      - run: npm run build:docs
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # End-to-end smoke of the headless playtest CLI (SSR-load → simulate) with
  # --no-write, so the 344-line CLI plumbing gets exercised in CI without
  # mutating the tree or auto-accepting its own drift-guard snapshot. (§10)
  playtest-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run playtest:smoke

  # gate-guard: fail if branch protection drifts from .github/required-checks.json.
  # Soft-skips when the token can't read protection (fork PRs, missing scope), so
  # it never blocks a legitimate build — it only bites on observable drift. (§6)
  gate-guard:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Assert branch protection matches .github/required-checks.json
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node tools/check-required-checks.mjs

  # Playwright e2e — the only CI coverage of the React → registry → GameScene →
  # TileObj canvas bridge that vitest (node/no-canvas) can't see. Runs all e2e
  # specs on chromium/Linux. Sharded ×3: the full suite boots the whole game
  # (Phaser/WebGL) per test, so single-runner wall-clock reliably blew the cap.
  # `fail-fast: false` keeps the other shards running when one fails. GitHub
  # reports these as `e2e (1|2|3)` — the `e2e-required` fan-in job below is what
  # branch protection requires (see header + §6/§8).
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      # Idempotent: re-fetches the binary if the cache is stale (e.g. Playwright
      # bumped its pinned browser revision without a package-lock change), and
      # always (re)installs the system libs a fresh ubuntu runner needs.
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e -- --shard=${{ matrix.shard }}/3
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-e2e-report-shard-${{ matrix.shard }}
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Fan-in gate: ONE stable check name that passes iff every e2e shard passed.
  # `needs.e2e.result` is the matrix job's aggregate result. Require THIS in
  # branch protection (not `e2e`, which never matches the sharded `e2e (1..3)`
  # contexts). `if: always()` so it still runs (and can fail) when a shard fails.
  e2e-required:
    needs: [e2e]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Assert all e2e shards passed
        run: |
          echo "aggregate e2e result: ${{ needs.e2e.result }}"
          if [ "${{ needs.e2e.result }}" != "success" ]; then
            echo "::error::One or more e2e shards did not pass."
            exit 1
          fi

  # Desktop visual smoke — INFORMATIONAL only (see header). continue-on-error
  # because the committed board goldens are WebGL/GPU/font-sensitive and were not
  # captured on this runner, so a pixel diff here is expected and not meaningful;
  # the gating visual signal is the structural manifest test in the `test` job.
  # Regenerate goldens on THIS runner via the `visual-rebaseline` dispatch.
  visual-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-smoke-diffs
          path: |
            test-results/visual/
            playwright-report/visual/
          retention-days: 7

  # Manual re-baseline of the desktop visual goldens ON the canonical Linux
  # runner (never local — DOM drifts 3–5%, Phaser WebGL ~38% off due to GPU/font
  # differences). Trigger with:
  #   gh workflow run ci.yml --ref <branch> -f update_goldens=true
  # The job regenerates the goldens and commits them straight back to the
  # dispatched branch (and uploads them as the `regenerated-goldens` artifact).
  visual-rebaseline:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - run: npm run test:visual:update # writes new PNGs into tests/visual/__goldens__/
      - uses: actions/upload-artifact@v4
        with:
          name: regenerated-goldens
          path: tests/visual/__goldens__/
          retention-days: 7
      # Commit the freshly-baselined PNGs back to the dispatched branch so the
      # author doesn't have to download + unzip the artifact by hand. No-ops
      # cleanly when the render is already byte-identical to the committed goldens.
      - name: Commit regenerated goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/visual/__goldens__/
          if git diff --cached --quiet; then
            echo "Goldens already up to date — nothing to commit."
          else
            git commit -m "test(visual): re-baseline desktop goldens on CI runner"
            git push origin HEAD:${GITHUB_REF_NAME}
          fi
