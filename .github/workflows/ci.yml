# CI — lint + typecheck + test + build + visual goldens on every PR vs main and
# push to main.
# Branch protection (set in repo settings):
#   - Require status checks: lint, typecheck, typecheck-tests, typecheck-test-files, test, build, visual, audit
#   - Do NOT mark `e2e` required yet: the tests/e2e suite is currently stale
#     (asserts old bottom-nav labels) and fails against main. Repair the specs,
#     then add `e2e` to the required list.
#   - Require branches to be up to date before merging
#   - Dismiss stale approvals on push

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (rapid pushes to a PR) to save minutes.
# `github.run_id` in the fallback keeps push-to-main runs from cancelling each other.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run action-types:check

  typecheck-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:tests

  typecheck-test-files:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:test-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Visual regression goldens (desktop smoke set). Runs inside the pinned
  # Playwright container so Chromium + system fonts match the environment the
  # committed goldens were captured in — keeping pixel diffs deterministic
  # across machines. Bump the image tag in lockstep with the @playwright/test
  # version in package.json. To refresh goldens after an intentional UI change,
  # run `npm run test:visual:update` in the same container and commit the PNGs.
  visual:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      # Vite dev server is auto-started by playwright.visual.config.js (webServer).
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-report
          path: |
            playwright-report/visual/
            test-results/visual/
          retention-days: 7

  # End-to-end browser flows (tests/e2e, 20 specs). Runs in the Playwright
  # container; the Vite dev server is auto-started by playwright.config.js.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-traces
          path: test-results/
          retention-days: 7

  # Dependency vulnerability gate. Fails only on high/critical advisories so
  # routine low/moderate transitive noise doesn't block merges.
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
