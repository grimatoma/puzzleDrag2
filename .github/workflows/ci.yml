# CI — lint + typecheck + test + build + e2e (gating) + visual smoke (non-blocking) on every PR vs main and push to main.
# Branch protection (set in repo settings — adding jobs here does NOT auto-gate merges):
#   - Require status checks: lint, typecheck, typecheck-tests, typecheck-test-files, test, build, e2e
#   - `e2e` is now GATING: the rotted specs were de-rotted and its `continue-on-error` removed
#     (see docs/projects/09-ci-e2e-gate-findings.md). A HUMAN must still add `e2e` to the required
#     status checks above in repo settings — flipping continue-on-error here does NOT auto-gate merges.
#   - `visual-smoke` is still NON-BLOCKING; add it AFTER its goldens are re-baselined on CI and
#     its `continue-on-error` is removed (see the `visual-rebaseline` job + procedure below).
#   - Require branches to be up to date before merging
#   - Dismiss stale approvals on push
# The gating checks must pass before a PR can merge; visual-smoke is informational for now.
#
# Re-baselining visual goldens (NEVER do this on a Windows/local host — DOM drifts 3–5%,
# Phaser WebGL ~38% off due to GPU/font differences; goldens must be made on this Linux runner):
#   1. gh workflow run ci.yml -f update_goldens=true   (or trigger via the Actions tab)
#   2. Download the `regenerated-goldens` artifact, unzip it over tests/visual/__goldens__/
#   3. Eyeball the PNGs, commit them, open a PR.
#   4. Once `visual-smoke` is green against the committed goldens, remove its `continue-on-error`
#      and add `visual-smoke` to the required status checks above.

name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      update_goldens:
        description: "Regenerate desktop visual goldens on the CI runner"
        type: boolean
        default: false

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run action-types:check

  typecheck-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:tests

  typecheck-test-files:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck:test-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # Playwright e2e — the only CI coverage of the React → registry → GameScene →
  # TileObj canvas bridge that vitest (node/no-canvas) can't see. Runs all e2e
  # specs on chromium/Linux (the config's single forced project). Playwright
  # starts its own Vite via `webServer` (reuseExistingServer is a no-op on a
  # clean runner).
  #
  # GATING: the previously-rotted specs were de-rotted (stale action fixtures,
  # selectors, balance/unlock assumptions, the zoned-inventory model, and the
  # dialogs-disabled-by-default flag — see docs/projects/09-ci-e2e-gate-findings.md).
  # `npm run test:e2e` is green on chromium/Linux. A human must add `e2e` to the
  # branch-protection required checks (see header) for it to actually block merges.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      # Idempotent: re-fetches the binary if the cache is stale (e.g. Playwright
      # bumped its pinned browser revision without a package-lock change), and
      # always (re)installs the system libs a fresh ubuntu runner needs.
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  # Desktop visual smoke (the 3 *.desktop-smoke specs via `npm run test:visual`).
  # Starts NON-BLOCKING: the committed goldens were not generated on this Linux
  # runner, so the first run is expected to diff. Once goldens are re-baselined
  # on CI (see the `visual-rebaseline` job + header procedure) and committed,
  # remove `continue-on-error` and add `visual-smoke` to the required checks.
  visual-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true # REMOVE after goldens are re-baselined on CI (see header)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      - run: npm run test:visual
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-smoke-diffs
          path: |
            test-results/visual/
            playwright-report/visual/
          retention-days: 7

  # Manual re-baseline of the desktop visual goldens ON the canonical Linux
  # runner (never local — see header). Trigger on a feature branch with:
  #   gh workflow run ci.yml --ref <branch> -f update_goldens=true
  # The job regenerates the PNGs and commits them straight back to the branch it
  # ran on (it also uploads them as the `regenerated-goldens` artifact as a
  # fallback). Open a PR from that branch; once `visual-smoke` is green against
  # the new goldens, remove its `continue-on-error` and add it to required checks.
  visual-rebaseline:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_goldens }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write # push the regenerated goldens back to the triggering branch
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Playwright chromium (+ system deps)
        run: npx playwright install --with-deps chromium
      # update mode writes new PNGs; it exits non-zero if a non-pixel failure
      # (e.g. a click timeout) prevents a capture, so don't fail the job on it —
      # we still want to commit every golden that WAS refreshed.
      - run: npm run test:visual:update # writes new PNGs into tests/visual/__goldens__/
        continue-on-error: true
      - name: Commit regenerated goldens back to the branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- tests/visual/__goldens__/; then
            echo "No golden changes to commit."
          else
            git add tests/visual/__goldens__/
            git commit -m "chore(visual): re-baseline desktop goldens on CI runner"
            git push origin "HEAD:${GITHUB_REF_NAME}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: regenerated-goldens
          path: tests/visual/__goldens__/
          retention-days: 7
