name: Update stable to main

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-preview-stable
  cancel-in-progress: true

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Fast-forward stable branch to main
        run: git push origin HEAD:refs/heads/stable --force

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - run: npm install
      - run: npm run build
        env:
          BASE_PATH: /puzzleDrag2/stable/

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: stable
