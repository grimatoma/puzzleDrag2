# Godot CI — runs the Godot port's headless tests and validates the Web export.
# Separate from ci.yml (the Phaser suite) so the existing branch-protected
# checks are untouched while the migration runs side-by-side (see
# docs/godot-migration-plan.html). Triggers when godot/** changes, when this
# workflow changes, or when the parity matrix / its tooling changes.
#
# Godot is pinned to 4.6.2 to match the version the port is developed against.

name: Godot CI

on:
  push:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'docs/parity-matrix.json'
      - 'tools/check-parity-matrix.mjs'
      - 'tools/build-parity-matrix.mjs'
      - 'tools/serve-godot-dist.mjs'
      - 'playwright.godot-web.config.js'
      - 'tests/godot-web/**'
  pull_request:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'docs/parity-matrix.json'
      - 'tools/check-parity-matrix.mjs'
      - 'tools/build-parity-matrix.mjs'
      - 'tools/serve-godot-dist.mjs'
      - 'playwright.godot-web.config.js'
      - 'tests/godot-web/**'

env:
  GODOT_VERSION: '4.6.2'

jobs:
  godot-tests:
    name: Headless unit + scene tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      # First run builds .godot/ (import cache + global class registry). MUST run
      # before the suite loop so class_name globals are registered.
      - name: Import project
        run: godot --headless --path godot --import

      # Auto-discover + run EVERY godot/tests/run_*.gd suite. Each runner prints
      # "N checks, M failure(s)" and exits 0 on all-pass / 1 on failure. This one
      # step gates ALL suites (current + future) — no per-suite step to keep in
      # sync. A suite is a failure if godot exits non-zero OR its output reports a
      # non-zero failure count (belt-and-suspenders, in case a runner ever prints
      # failures but still exits 0).
      - name: Run all headless test suites
        run: |
          fail=0
          for f in godot/tests/run_*.gd; do
            name=$(basename "$f")
            echo "── $name ──────────────"
            out=$(godot --headless --path godot --script "res://tests/$name" 2>&1) || { echo "$out"; echo "::error::$name exited non-zero"; fail=1; continue; }
            echo "$out"
            if echo "$out" | grep -qE "[1-9][0-9]* failure"; then echo "::error::$name reported failures"; fail=1; fi
          done
          exit $fail

  godot-gdunit4:
    name: GdUnit4 starter suite
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # ADDITIVE to godot-tests. The legacy run_*.gd harness above stays the
    # comprehensive compatibility runner; this job runs the vendored GdUnit4
    # framework (addons/gdUnit4/, v6.1.3 — supports Godot 4.6.2) over the
    # GdUnitTestSuite starter suites under godot/test/. We replicate the exact
    # headless CLI invocation that was verified locally (setup-godot → import →
    # GdUnitCmdTool on res://test) rather than the gdunit4-action, so the runner
    # is identical to what's reproducible from a dev machine. This is a REAL gate:
    # GdUnitCmdTool exits 0 only when every test passes (1 on any failure/error).
    # --ignoreHeadlessMode is required because GdUnit4 refuses headless by default;
    # the starter suites are pure logic (no UI InputEvents) so headless is safe.
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      # Builds .godot/ (import cache + global class registry, incl. the vendored
      # addon's class_names). MUST run before the GdUnit4 runner.
      - name: Import project
        run: godot --headless --path godot --import

      - name: Run GdUnit4 starter suite (res://test)
        run: |
          godot --headless --path godot \
            -s res://addons/gdUnit4/bin/GdUnitCmdTool.gd \
            -a res://test --ignoreHeadlessMode -c

  parity-matrix-check:
    name: Parity matrix validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Guards docs/parity-matrix.json: every "full" row must reference a real
      # run_*.gd suite on disk (the anti-"+undefined" guard). Exits 0 clean.
      - name: Validate parity matrix
        run: node tools/check-parity-matrix.mjs

  godot-web-export:
    name: Web (HTML5) export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }} + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --path godot --import

      - name: Export Web build
        run: |
          mkdir -p godot/dist
          godot --headless --path godot --export-release "Web" dist/index.html

      - name: Sanity-check export output
        run: |
          test -f godot/dist/index.html
          test -f godot/dist/index.wasm
          echo "Web export contents:"
          ls -la godot/dist

      # Boot the just-exported build in headless Chromium and assert it actually
      # initializes (WASM + pck load, the main scene's _ready runs). This is a
      # REAL gate — a boot failure (wasm trap / JS exception / never-ready) fails
      # CI. Reuses godot/dist/ from the export step above; serves it via
      # tools/serve-godot-dist.mjs (Playwright's webServer launches it).
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install npm deps
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Web-boot smoke (headless Chromium)
        run: npx playwright test -c playwright.godot-web.config.js

      - uses: actions/upload-artifact@v4
        with:
          name: godot-web
          path: godot/dist/

  godot-visual:
    name: Visual regression (render-smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Best-effort render-smoke: the harness (godot/tests/run_visual_tests.gd) needs a real
    # rendering backend, which the headless godot-tests job deliberately lacks (it skips the
    # suite). Here we run it UNDER xvfb with the opengl3 driver so it actually renders. No
    # Linux goldens are committed (pixel output diverges from the Windows/NVIDIA goldens under
    # llvmpipe), so every scenario runs in RENDER-SMOKE mode — it proves each surface renders
    # a non-blank 720×1280 frame on Linux. continue-on-error because GPU-less GitHub runners
    # (xvfb + mesa/llvmpipe software GL) are an environment we can't fully validate from here;
    # a flake must not block the PR. Promote to a hard gate once it's proven stable in CI.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      # Mesa software GL (llvmpipe) + xvfb so Godot's opengl3 driver has a framebuffer to
      # draw into on a headless Linux runner.
      - name: Install mesa + xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri mesa-utils

      - name: Import project
        run: godot --headless --path godot --import

      # Run the visual harness with a virtual framebuffer + the opengl3 renderer. Without a
      # committed Linux golden each scenario falls back to render-smoke (size + non-blank).
      - name: Run visual regression (render-smoke under xvfb)
        run: |
          xvfb-run -a godot --path godot --rendering-driver opengl3 \
            --script res://tests/run_visual_tests.gd
