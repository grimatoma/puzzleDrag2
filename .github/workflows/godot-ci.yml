# Godot CI — runs the Godot port's headless tests and validates the Web export.
# Separate from ci.yml (the Phaser suite) so the existing branch-protected
# checks are untouched while the migration runs side-by-side (see
# docs/godot-migration-plan.html). Triggers only when godot/** changes.
#
# Godot is pinned to 4.6.2 to match the version the port is developed against.

name: Godot CI

on:
  push:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'

env:
  GODOT_VERSION: '4.6.2'

jobs:
  godot-tests:
    name: Headless unit + scene tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      # First run builds .godot/ (import cache + global class registry).
      - name: Import project
        run: godot --headless --path godot --import

      - name: Board logic tests
        run: godot --headless --path godot --script res://tests/run_tests.gd

      - name: Game state + save/load tests
        run: godot --headless --path godot --script res://tests/run_state_tests.gd

      - name: Town tier ladder tests
        run: godot --headless --path godot --script res://tests/run_town_tests.gd

      - name: Building / spawner tests
        run: godot --headless --path godot --script res://tests/run_building_tests.gd

      - name: Economy (refining / market) tests
        run: godot --headless --path godot --script res://tests/run_economy_tests.gd

      - name: Orders tests
        run: godot --headless --path godot --script res://tests/run_orders_tests.gd

      - name: Town UI tests
        run: godot --headless --path godot --script res://tests/run_town_ui_tests.gd

      - name: Mine / expedition tests
        run: godot --headless --path godot --script res://tests/run_mine_tests.gd

      - name: Boss tests
        run: godot --headless --path godot --script res://tests/run_boss_tests.gd

      - name: Rats / Ratcatcher tests
        run: godot --headless --path godot --script res://tests/run_rats_tests.gd

      - name: Scene wiring smoke test
        run: godot --headless --path godot --script res://tests/run_scene_smoke.gd

      - name: Asset pipeline tests
        run: godot --headless --path godot --script res://tests/run_assets_tests.gd

      - name: Audio tests
        run: godot --headless --path godot --script res://tests/run_audio_tests.gd

  godot-web-export:
    name: Web (HTML5) export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }} + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --path godot --import

      - name: Export Web build
        run: |
          mkdir -p godot/dist
          godot --headless --path godot --export-release "Web" dist/index.html

      - name: Sanity-check export output
        run: |
          test -f godot/dist/index.html
          test -f godot/dist/index.wasm
          echo "Web export contents:"
          ls -la godot/dist

      - uses: actions/upload-artifact@v4
        with:
          name: godot-web
          path: godot/dist/
