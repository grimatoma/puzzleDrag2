# Godot CI — runs the Godot port's headless tests and validates the Web export.
# Separate from ci.yml (the Phaser suite) so the existing branch-protected
# checks are untouched while the migration runs side-by-side (see
# docs/godot-migration-plan.html). Triggers when godot/** changes, when this
# workflow changes, or when the parity matrix / its tooling changes.
#
# Godot is pinned to 4.6.2 to match the version the port is developed against.

name: Godot CI

on:
  push:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'docs/parity-matrix.json'
      - 'tools/check-parity-matrix.mjs'
      - 'tools/build-parity-matrix.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'godot/**'
      - '.github/workflows/godot-ci.yml'
      - 'docs/parity-matrix.json'
      - 'tools/check-parity-matrix.mjs'
      - 'tools/build-parity-matrix.mjs'

env:
  GODOT_VERSION: '4.6.2'

jobs:
  godot-tests:
    name: Headless unit + scene tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }}
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: false

      # First run builds .godot/ (import cache + global class registry). MUST run
      # before the suite loop so class_name globals are registered.
      - name: Import project
        run: godot --headless --path godot --import

      # Auto-discover + run EVERY godot/tests/run_*.gd suite. Each runner prints
      # "N checks, M failure(s)" and exits 0 on all-pass / 1 on failure. This one
      # step gates ALL suites (current + future) — no per-suite step to keep in
      # sync. A suite is a failure if godot exits non-zero OR its output reports a
      # non-zero failure count (belt-and-suspenders, in case a runner ever prints
      # failures but still exits 0).
      - name: Run all headless test suites
        run: |
          fail=0
          for f in godot/tests/run_*.gd; do
            name=$(basename "$f")
            echo "── $name ──────────────"
            out=$(godot --headless --path godot --script "res://tests/$name" 2>&1) || { echo "$out"; echo "::error::$name exited non-zero"; fail=1; continue; }
            echo "$out"
            if echo "$out" | grep -qE "[1-9][0-9]* failure"; then echo "::error::$name reported failures"; fail=1; fi
          done
          exit $fail

  parity-matrix-check:
    name: Parity matrix validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Guards docs/parity-matrix.json: every "full" row must reference a real
      # run_*.gd suite on disk (the anti-"+undefined" guard). Exits 0 clean.
      - name: Validate parity matrix
        run: node tools/check-parity-matrix.mjs

  godot-web-export:
    name: Web (HTML5) export
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Godot ${{ env.GODOT_VERSION }} + export templates
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ env.GODOT_VERSION }}
          use-dotnet: false
          include-templates: true

      - name: Import project
        run: godot --headless --path godot --import

      - name: Export Web build
        run: |
          mkdir -p godot/dist
          godot --headless --path godot --export-release "Web" dist/index.html

      - name: Sanity-check export output
        run: |
          test -f godot/dist/index.html
          test -f godot/dist/index.wasm
          echo "Web export contents:"
          ls -la godot/dist

      - uses: actions/upload-artifact@v4
        with:
          name: godot-web
          path: godot/dist/
