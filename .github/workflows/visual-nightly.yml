# Nightly mobile visual regression (iPhone landscape + portrait, ~154 goldens).
# Kept off the per-PR path: the mobile matrix is slower and more flake-prone, so
# it runs on a schedule against main (and on demand). Runs in the pinned
# Playwright container so pixels match the committed goldens. To refresh after
# an intentional UI change, run `npm run test:visual:mobile:update` in the same
# container image and commit the PNGs.
name: Visual (nightly mobile)

on:
  schedule:
    # 07:00 UTC daily
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: visual-nightly
  cancel-in-progress: true

jobs:
  mobile:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
    steps:
      - uses: actions/checkout@v4
      - run: npm ci
      - run: npm run test:visual:mobile
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-mobile-report
          path: |
            playwright-report/visual/
            test-results/visual/
          retention-days: 7
